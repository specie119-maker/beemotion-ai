<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeMotion - 재래시장 쇼핑하기</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { height: 100vh; display: flex; overflow: hidden; background: #f8fafc; color: #1f2937; }
        #settings-panel { width: 450px; background: #fff; padding: 40px; box-shadow: 2px 0 20px rgba(0,0,0,.06); z-index: 100; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; }
        .settings-title { font-size: 30px; font-weight: 900; color: #3A2A14; }
        .program-desc { font-size: 17px; line-height: 1.65; font-weight: 700; color: #666; }
        .settings-group { display: flex; flex-direction: column; gap: 10px; }
        .settings-group label { font-size: 18px; font-weight: 900; color: #3A2A14; }
        .radio-options { display: flex; gap: 10px; flex-wrap: wrap; }
        .radio-btn { flex: 1; padding: 13px 10px; border: 2px solid #e2e8f0; border-radius: 12px; text-align: center; cursor: pointer; font-weight: 800; background: #fff; user-select: none; }
        .radio-btn.active { border-color: #FFC400; background: #FFF8E6; color: #3A2A14; }
        .btn-action { background: #FFC400; color: #3A2A14; border: 0; padding: 18px; border-radius: 16px; font-size: 20px; font-weight: 900; cursor: pointer; }
        .btn-camera { background: #3A2A14; color: #fff; }
        
        #exercise-area { flex: 1; position: relative; background: #cce5ff; overflow: hidden; }
        
        /* Walking Perspective Background */
        #marketVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 20px 40px; z-index: 10; display: none; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,.62), rgba(0,0,0,0)); }
        #top-bar.active { display: flex; }
        .top-stat { min-width: 190px; padding: 10px 24px; border-radius: 18px; background: rgba(255,255,255,.94); color: #3A2A14; font-size: 28px; font-weight: 900; text-align: center; }
        .top-title { color: #fff; font-size: 34px; font-weight: 900; text-align: center; text-shadow: 0 3px 12px rgba(0,0,0,.45); }
        
        #video_container {
            position: absolute; right: 20px; bottom: 20px; width: 240px; height: 180px;
            border-radius: 16px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,.3); z-index: 20;
            background: #000;
        }
        #video_input { display: block; position: fixed; left: -9999px; top: 0; width: 1px; height: 1px; opacity: 0; }
        #pose_canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); z-index: 21; background: #000; }
        
        #pose-warning-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); color: #fff; display: none; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center; 
            padding: 10px; z-index: 100;
        }
        
        #scene_canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #guide-overlay { position: absolute; left: 50%; top: 40%; transform: translate(-50%, -50%); z-index: 10; max-width: 600px; padding: 22px 26px; border-radius: 18px; background: rgba(255,255,255,.95); color: #3A2A14; border: 3px solid #FFC400; box-shadow: 0 10px 30px rgba(0,0,0,.16); display: none; text-align: center; }
        #guide-overlay .main-guide { font-size: 28px; font-weight: 900; color: #3A2A14; margin-bottom: 10px; }
        #guide-overlay .sub-guide { font-size: 18px; font-weight: 800; line-height: 1.55; }
        

        .overlay-screen { position: absolute; inset: 0; z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: rgba(250,246,237,.96); }
        .overlay-screen.active { display: flex; }
        .result-title { font-size: 68px; font-weight: 900; color: #3A2A14; margin-bottom: 20px; }
        .result-score { font-size: 36px; font-weight: 800; color: #A87400; margin-bottom: 20px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="settings-panel">
        <div class="settings-title">🛒 재래시장 쇼핑하기</div>
        <div class="program-desc">
            정겨운 시장길을 걸으며 추억 여행을 떠나보세요.<br>걷기 운동과 회상 활동을 함께 즐길 수 있습니다.
        </div>

        <div id="individual-settings" style="display: flex; flex-direction: column; gap: 25px; margin-top: 20px;">
            <div class="settings-group" id="group-target-time">
                <label>운동 시간</label>
                <div class="radio-options" id="opt-time">
                    <div class="radio-btn active" data-val="60">60초</div>
                    <div class="radio-btn" data-val="90">90초</div>
                </div>
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <div id="pose-status" style="text-align:center; font-weight:900; color:#ef4444; font-size:15px; word-break:keep-all;">카메라를 켜고 상체와 허리까지 화면에 보이도록 서주세요.</div>
            <button class="btn-action btn-camera" id="btn-camera" onclick="startCamera()">카메라 켜기</button>
            <button class="btn-action" id="btn-start" style="opacity:1; pointer-events:auto;" onclick="startRound()">쇼핑 시작하기</button>
            <button class="btn-action" style="background:transparent; color:#666; border: 2px solid #ccc;" onclick="location.href='index.html'">돌아가기</button>
        </div>
    </div>

    <div id="exercise-area">
        <video id="marketVideo" src="../asserts/%E1%84%8C%E1%85%A2%E1%84%85%E1%85%A2%E1%84%89%E1%85%B5%E1%84%8C%E1%85%A1%E1%86%BC%E1%84%89%E1%85%AD%E1%84%91%E1%85%B5%E1%86%BC%E1%84%92%E1%85%A1%E1%84%80%E1%85%B5/shopping1.mov" muted playsinline preload="auto" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;"></video>
        
        <div id="top-bar">
            <div class="top-stat" id="ui-left-stat">남은시간 60초</div>
            <div class="top-title" id="ui-title">재래시장 쇼핑하기</div>
            <div class="top-stat" id="ui-right-stat" style="color:#A87400;">걸음수 0보</div>
        </div>



        <div id="guide-overlay">
            <div class="main-guide">카메라에 상체가 보이게 서주세요.</div>
            <div class="sub-guide">제자리 걷기를 하시면 전통시장 골목으로 장바구니가 이동합니다.</div>
        </div>

        <div id="video_container">
            <video id="video_input" autoplay playsinline></video>
            <canvas id="pose_canvas"></canvas>
            <div id="camera-status-overlay" style="position:absolute; top:10px; width:100%; text-align:center; font-weight:800; font-size:15px; z-index:62; padding:0 5px; word-break:keep-all;"></div>
            <div id="pose-warning-overlay">
                <div style="font-size:24px; margin-bottom:5px;">⚠️</div>
                <div style="font-size:14px; font-weight:800; word-break:keep-all;">조금 뒤로<br>이동해주세요.</div>
            </div>
        </div>
        


        <div class="overlay-screen" id="result-screen">
            <div class="result-title" id="res-title">시장 구경 완료! 🛒</div>
            
            <div class="result-score" id="res-score" style="font-size:50px; color:#3A2A14; margin-bottom: 15px;">총 걸음: 0보</div>
            <div class="result-score" id="res-time" style="font-size:36px; margin-bottom: 15px; color:#666;">운동시간: 0초</div>

            <button class="btn-action" style="padding:20px 60px; font-size:28px;" id="res-btn" onclick="nextAction()">다시 쇼핑하기</button>
        </div>
    </div>



    <script>
        let targetTime = 60;
        
        function setupRadioGroup(groupId, onChange) {
            const groupEl = document.getElementById(groupId);
            if (!groupEl) return;
            const btns = groupEl.querySelectorAll('.radio-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (onChange) onChange(btn.dataset.val);
                });
            });
        }
        setupRadioGroup('opt-time', val => targetTime = parseInt(val));

        // Game State Variables
        let isRunning = false;
        let isCameraOn = false;
        let isReady = false;
        let totalSteps = 0;
        
        let timeLeft = 0;
        let timeElapsed = 0;
        let gameTimer = null;
        let camera = null;
        let poseRecognized = false;
        let isPosePaused = false;
        let bgScale = 1.0;
        let walkingState = false;

        // Motion Tracking Variables
        let bodyCenterYBaseline = null;
        let bodyCenterYSmoothed = null;
        let bodyCenterXBaseline = null;
        let bodyCenterXSmoothed = null;
        let lastStepTime = 0;
        let lastMotionTime = 0;

        const videoElement = document.getElementById('video_input');
        const poseCanvas = document.getElementById('pose_canvas');
        const poseCtx = poseCanvas.getContext('2d');

        const marketVideos = [
            "../asserts/%E1%84%8C%E1%85%A2%E1%84%85%E1%85%A2%E1%84%89%E1%85%B5%E1%84%8C%E1%85%A1%E1%86%BC%E1%84%89%E1%85%AD%E1%84%91%E1%85%B5%E1%86%BC%E1%84%92%E1%85%A1%E1%84%80%E1%85%B5/shopping1.mov",
            "../asserts/%E1%84%8C%E1%85%A2%E1%84%85%E1%85%A2%E1%84%89%E1%85%B5%E1%84%8C%E1%85%A1%E1%86%BC%E1%84%89%E1%85%AD%E1%84%91%E1%85%B5%E1%86%BC%E1%84%92%E1%85%A1%E1%84%80%E1%85%B5/sopping2.mov",
            "../asserts/%E1%84%8C%E1%85%A2%E1%84%85%E1%85%A2%E1%84%89%E1%85%B5%E1%84%8C%E1%85%A1%E1%86%BC%E1%84%89%E1%85%AD%E1%84%91%E1%85%B5%E1%86%BC%E1%84%92%E1%85%A1%E1%84%80%E1%85%B5/sopping3.mov",
            "../asserts/%E1%84%8C%E1%85%A2%E1%84%85%E1%85%A2%E1%84%89%E1%85%B5%E1%84%8C%E1%85%A1%E1%86%BC%E1%84%89%E1%85%AD%E1%84%91%E1%85%B5%E1%86%BC%E1%84%92%E1%85%A1%E1%84%80%E1%85%B5/sopping4.mov",
            "../asserts/%E1%84%8C%E1%85%A2%E1%84%85%E1%85%A2%E1%84%89%E1%85%B5%E1%84%8C%E1%85%A1%E1%86%BC%E1%84%89%E1%85%AD%E1%84%91%E1%85%B5%E1%86%BC%E1%84%92%E1%85%A1%E1%84%80%E1%85%B5/sopping5.mov"
        ];
        let currentVideoIndex = 0;

        const marketVideoEl = document.getElementById('marketVideo');
        marketVideoEl.addEventListener("ended", () => {
            currentVideoIndex++;
            if (currentVideoIndex >= marketVideos.length) {
                currentVideoIndex = 0;
            }
            marketVideoEl.src = marketVideos[currentVideoIndex];
            marketVideoEl.play().catch(err => console.log("영상 재생 실패:", err));
        });

        function resizeCanvases() {
            poseCanvas.width = 240;
            poseCanvas.height = 180;
        }
        window.addEventListener('resize', resizeCanvases);

        function updateTopBar() {
            document.getElementById('ui-left-stat').innerText = `남은시간 ${timeLeft}초`;
            document.getElementById('ui-right-stat').innerText = `걸음수 ${totalSteps}보`;
        }

        function setGuideMessage(main, sub) {
            const guide = document.getElementById('guide-overlay');
            guide.style.display = 'block';
            guide.querySelector('.main-guide').innerText = main;
            guide.querySelector('.sub-guide').innerText = sub;
            setTimeout(() => { if (!isRunning) return; guide.style.display = 'none'; }, 4000);
        }



        // --- Pose Logic ---
        const pose = new Pose({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.55, minTrackingConfidence: 0.5 });
        
        pose.onResults(results => {
            poseCtx.save();
            poseCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
            poseCtx.fillStyle = "#000";
            poseCtx.fillRect(0, 0, poseCanvas.width, poseCanvas.height);
            
            console.log("pose landmarks:", results.poseLandmarks?.length);
            
            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                const shoulderReady = lm[11] && lm[11].visibility > 0.4 && lm[12] && lm[12].visibility > 0.4;
                isReady = shoulderReady;

                if (isReady) {
                    if (!poseRecognized) {
                        poseRecognized = true;
                        document.getElementById('pose-status').innerText = '준비 완료! 시작하기 버튼을 눌러 쇼핑을 시작하세요.';
                        document.getElementById('pose-status').style.color = '#22c55e';
                        
                        const camOverlay = document.getElementById('camera-status-overlay');
                        camOverlay.innerText = 'AI 몸 인식 완료';
                        camOverlay.style.color = '#22c55e';
                    }
                    if (isRunning) {
                        isPosePaused = false;
                        document.getElementById('pose-warning-overlay').style.display = 'none';
                        processWalkingMotion(lm);
                    }
                } else {
                    if (poseRecognized || document.getElementById('pose-status').innerText.includes('카메라를 켜고')) {
                        poseRecognized = false;
                        document.getElementById('pose-status').innerText = '어깨가 보이면 쇼핑을 시작할 수 있어요.';
                        document.getElementById('pose-status').style.color = '#ef4444';
                    }
                    if (isRunning) {
                        isPosePaused = true;
                        document.getElementById('pose-warning-overlay').style.display = 'flex';
                        walkingState = false;
                    }
                }
                
                const filteredLm = lm.map((point, index) => {
                    if (index <= 10) return { ...point, visibility: 0 };
                    return point;
                });
                
                drawConnectors(poseCtx, filteredLm, POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
                drawLandmarks(poseCtx, filteredLm, { color: '#00FF00', lineWidth: 2, radius: 4 });
            } else {
                if (poseRecognized || document.getElementById('pose-status').innerText.includes('카메라를 켜고')) {
                    poseRecognized = false;
                    document.getElementById('pose-status').innerText = 'TV 화면 사용 시 카메라는 몸 전체가 보이도록 설치해주세요.';
                    document.getElementById('pose-status').style.color = '#ef4444';
                }
                if (isRunning) {
                    isPosePaused = true;
                    document.getElementById('pose-warning-overlay').style.display = 'flex';
                    walkingState = false;
                }
            }
            poseCtx.restore();
        });

        function processWalkingMotion(lm) {
            if (!lm[11] || !lm[12] || lm[11].visibility <= 0.4 || lm[12].visibility <= 0.4) return;
            
            const bodyY = (lm[11].y + lm[12].y) / 2;
            const bodyX = (lm[11].x + lm[12].x) / 2;

            if (bodyCenterYSmoothed === null) {
                bodyCenterYSmoothed = bodyY;
                bodyCenterYBaseline = bodyY;
                bodyCenterXSmoothed = bodyX;
                bodyCenterXBaseline = bodyX;
            } else {
                bodyCenterYSmoothed = bodyCenterYSmoothed * 0.7 + bodyY * 0.3;
                bodyCenterXSmoothed = bodyCenterXSmoothed * 0.7 + bodyX * 0.3;
            }

            bodyCenterYBaseline = Math.max(bodyCenterYBaseline * 0.95 + bodyCenterYSmoothed * 0.05, bodyCenterYSmoothed);
            bodyCenterXBaseline = bodyCenterXBaseline * 0.95 + bodyCenterXSmoothed * 0.05;

            const diffY = bodyCenterYBaseline - bodyCenterYSmoothed;
            const diffX = Math.abs(bodyCenterXBaseline - bodyCenterXSmoothed);
            
            const thresholdY = 0.004;
            const thresholdX = 0.004;

            if (diffY > thresholdY || diffX > thresholdX) {
                lastMotionTime = performance.now();
                registerStep();
            }

            const now = performance.now();
            if (now - lastMotionTime < 1000) {
                if (!walkingState) {
                    walkingState = true;
                    document.getElementById('marketVideo').play().catch(e => {});
                }
            } else {
                if (walkingState) {
                    walkingState = false;
                    document.getElementById('marketVideo').pause();
                }
            }
        }

        function registerStep() {
            const now = performance.now();
            if (now - lastStepTime < 1200) return; // 1.2초 딜레이

            totalSteps++;
            lastStepTime = now;
            updateTopBar();
        }

        // --- Game Flow ---
        function startCamera() {
            const btnCam = document.getElementById('btn-camera');
            btnCam.innerText = '카메라 켜는 중...';
            camera = new Camera(videoElement, {
                onFrame: async () => { await pose.send({ image: videoElement }); },
                width: 640, height: 480
            });
            camera.start().then(() => {
                isCameraOn = true;
                btnCam.innerText = '카메라 켜짐';
                btnCam.disabled = true;
            });
        }

        function startRound() {
            if (!isCameraOn) {
                alert("카메라를 먼저 켜주세요.");
                return;
            }
            
            isRunning = true;
            document.getElementById('settings-panel').classList.add('hidden');
            document.getElementById('top-bar').classList.add('active');
            resizeCanvases();
            
            totalSteps = 0;
            timeElapsed = 0;
            bgScale = 1.0;
            bodyCenterYBaseline = null;
            bodyCenterYSmoothed = null;
            bodyCenterXBaseline = null;
            bodyCenterXSmoothed = null;
            walkingState = false;
            isPosePaused = false;
            lastMotionTime = 0;
            document.getElementById('pose-warning-overlay').style.display = 'none';
            
            timeLeft = targetTime;
            updateTopBar();
            setGuideMessage('쇼핑 시작!', '제자리 걷기를 하여 시장 골목을 구경하세요.');
            
            const marketVideo = document.getElementById('marketVideo');
            marketVideo.currentTime = 0;
            
            gameTimer = setInterval(() => {
                timeElapsed++;
                timeLeft--;
                if (timeLeft <= 0) {
                    endRound();
                }
                updateTopBar();
            }, 1000);
        }

        function endRound() {
            isRunning = false;
            clearInterval(gameTimer);
            walkingState = false;
            document.getElementById('marketVideo').pause();
            const resScreen = document.getElementById('result-screen');
            document.getElementById('res-score').innerText = `총 걸음: ${totalSteps}보`;
            document.getElementById('res-time').innerText = `운동시간: ${timeElapsed}초`;
            
            resScreen.classList.add('active');
        }

        function nextAction() {
            document.getElementById('result-screen').classList.remove('active');
            document.getElementById('settings-panel').classList.remove('hidden');
            document.getElementById('top-bar').classList.remove('active');
        }
    </script>
</body>
</html>
